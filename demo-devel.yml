compatible: sdk

product_info:
  name: 'App SDK Demo Bundle (development firmware)'
  code: 'EM400' # This is used for the default hostname

  manufacturer: 'TQ-Systems GmbH'
  manufacturer_url: 'https://www.tq-group.com/'

defaults:
  cache: true

apps:
  access-token:
    version: '2.0.2'

  devel:
    arch: 'all'
    version: '1.4.4'

  go-demo:
    version: 'latest'
    url: file://${TQEM_BASE_DEPLOY_PATH}/snapshots/apps/go-demo/main/{app}_{version}_{arch}.empkg

  json:
    version: '3.0.1'

  smart-meter:
    version: '3.0.2'

  upnp:
    version: '2.1.1'
